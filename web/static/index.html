<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Agent Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <div id="titlebar">
    <span class="title-icon">◉ ○ ×</span>
    <span class="title-text">Coding Agent Harness</span>
    <span id="status" class="status-dot disconnected" title="Disconnected"></span>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">HISTORY</div>
        <div id="session-list"></div>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-divider"></div>
        <div class="tool-item" onclick="location.reload()">
          <span class="tool-icon">↻</span> New Session
        </div>
      </div>
    </div>
    <div id="terminal">
      <div id="output"></div>
      <div id="input-area">
        <span class="prompt">></span>
        <input type="text" id="task-input" placeholder="Enter a task..." autofocus>
        <button id="send-btn" title="Send (Enter)">→</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
