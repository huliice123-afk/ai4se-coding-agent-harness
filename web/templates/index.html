<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Agent Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand">Coding Agent</span>
      <button id="new-session-btn" title="New session">+ New</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">HISTORY</div>
      <div id="session-list"><div class="session-empty">No sessions yet</div></div>
    </div>
  </aside>
  <main id="chat-area">
    <header id="chat-header">
      <span id="status" class="status-dot disconnected" title="Disconnected"></span>
      <span class="chat-title">Coding Agent Harness</span>
      <span class="chat-subtitle">DeepSeek</span>
    </header>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="task-input" rows="1" placeholder="Send a message..." autofocus></textarea>
      <button id="send-btn" title="Send (Enter)">Send</button>
    </div>
  </main>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
