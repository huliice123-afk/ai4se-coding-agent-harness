services:
  - type: web
    name: coding-agent-harness
    runtime: docker
    dockerfilePath: ./web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PORT
        value: "5000"
    healthCheckPath: /
    autoDeploy: true
